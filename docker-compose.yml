services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: fileclassification
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fileclassification"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=fileclassification;Username=postgres;Password=postgres
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=fileclassification;Username=postgres;Password=postgres
      DOTNET_ENVIRONMENT: Production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
